  <h1>mcb<span class="h1thing">Code</span> Login</h1>
  <p style="color: #fff;">Email</p>
  <input id="email"></input>
  <br><div class="divider"></div><br>
  <p style="color: #fff;">Password</p>
  <input id="password" type="password"></input>
  <br><br>
  <div style="user-select: none;">
      <div class="top-navi">
          <button id="loginBtn">Login</button>
          <br><br>
          <a href="https://mcbcode.com/signup">Dont have an account? <g>Sign up</g></a>
      </div>
  </div>

<script>
  const loginBtn = document.getElementById('loginBtn');

  loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    // Change this to your actual custom domain
    const response = await fetch('https://auth.mcbcode.com/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    if (response.ok) {
      alert('Logged in successfully!');
      window.location.href = '/dashboard'; // Send them to the members area
    } else {
      alert('Login failed. Check your email or password.');
    }
  });
</script>
